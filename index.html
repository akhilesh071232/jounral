<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurum · Gold Trading Journal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0D1016;
  --sidebar:#090B10;
  --surface:#151A22;
  --surface-2:#1B212B;
  --border:#262D39;
  --border-soft:#1E2430;
  --gold:#D4AF37;
  --gold-light:#F2D680;
  --gold-dim:#8A7430;
  --text:#ECE7DA;
  --text-muted:#8993A4;
  --text-faint:#5C6472;
  --profit:#2FD9A6;
  --profit-dim:#163A33;
  --loss:#FF5D73;
  --loss-dim:#3A1B22;
  --be:#9AA3B2;
  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  --radius:10px;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 15% 0%, rgba(212,175,55,0.07), transparent 40%),
    radial-gradient(circle at 100% 30%, rgba(212,175,55,0.04), transparent 35%);
}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
input, select, textarea{font-family:inherit;}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}

.app{display:flex; min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:248px;
  flex:0 0 248px;
  background:var(--sidebar);
  border-right:1px solid var(--border-soft);
  display:flex;
  flex-direction:column;
  padding:22px 16px;
  position:sticky;
  top:0;
  height:100vh;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  padding:6px 8px 22px 8px;
  border-bottom:1px solid var(--border-soft);
  margin-bottom:18px;
}
.brand-mark{
  width:38px; height:38px;
  border-radius:8px;
  background:linear-gradient(145deg, var(--gold-light), var(--gold) 45%, #7A6324 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display);
  font-weight:700;
  font-size:16px;
  color:#26200B;
  box-shadow:0 0 0 1px rgba(212,175,55,0.25), 0 6px 14px -4px rgba(212,175,55,0.35);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.brand-mark::after{
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.55) 48%, transparent 60%);
  transform:translateX(-100%);
  animation:shimmer 4.5s ease-in-out infinite;
}
@keyframes shimmer{
  0%,40%{transform:translateX(-120%);}
  60%,100%{transform:translateX(120%);}
}
.brand-name{font-family:var(--font-display); font-weight:600; font-size:16.5px; letter-spacing:0.3px; line-height:1.15;}
.brand-sub{font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); letter-spacing:1px; margin-top:2px;}

.nav{display:flex; flex-direction:column; gap:3px; flex:1;}
.nav-item{
  display:flex; align-items:center; gap:11px;
  padding:10px 12px;
  border-radius:8px;
  color:var(--text-muted);
  font-size:13.5px;
  font-weight:500;
  transition:background .15s, color .15s;
  border:1px solid transparent;
}
.nav-item svg{width:16px; height:16px; flex-shrink:0; opacity:.85;}
.nav-item:hover{background:var(--surface); color:var(--text);}
.nav-item.active{
  background:linear-gradient(90deg, rgba(212,175,55,0.16), rgba(212,175,55,0.03));
  color:var(--gold-light);
  border-color:rgba(212,175,55,0.25);
}
.nav-item.active svg{opacity:1;}

.sidebar-footer{
  border-top:1px solid var(--border-soft);
  padding-top:14px;
  margin-top:10px;
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-faint);
  letter-spacing:0.5px;
}

/* ---------- MAIN ---------- */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  height:3px;
  background:linear-gradient(90deg, var(--gold-dim), var(--gold-light), var(--gold-dim));
}
.page{padding:34px 38px 60px; max-width:1480px; width:100%; margin:0 auto;}

.eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:2px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:8px;
  display:flex; align-items:center; gap:8px;
}
.eyebrow::before{content:''; width:14px; height:1px; background:var(--gold-dim);}
.page-head{display:flex; justify-content:space-between; align-items:flex-end; gap:18px; margin-bottom:26px; flex-wrap:wrap;}
.page-title{font-family:var(--font-display); font-size:35px; font-weight:600; letter-spacing:0.2px;}
.page-desc{color:var(--text-muted); font-size:13.5px; margin-top:6px; max-width:560px;}
.head-actions{display:flex; gap:9px; flex-wrap:wrap;}

.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 14px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-size:12.5px;
  font-weight:500;
  transition:border-color .15s, background .15s, transform .1s;
}
.btn svg{width:14px; height:14px;}
.btn:hover{border-color:var(--gold-dim); background:var(--surface-2);}
.btn:active{transform:scale(0.97);}
.btn-gold{
  background:linear-gradient(135deg, var(--gold-light), var(--gold));
  color:#241F0A; border:none; font-weight:600;
}
.btn-gold:hover{filter:brightness(1.07);}
.btn-danger{color:var(--loss); border-color:rgba(255,93,115,0.25);}
.btn-danger:hover{background:var(--loss-dim); border-color:var(--loss);}

/* ---------- CARDS / STATS ---------- */
.grid{display:grid; gap:14px;}
.grid-5{grid-template-columns:repeat(5, 1fr);}
.grid-4{grid-template-columns:repeat(4, 1fr);}
.grid-3{grid-template-columns:repeat(3, 1fr);}
.grid-2{grid-template-columns:repeat(2, 1fr);}
@media(max-width:1200px){.grid-5{grid-template-columns:repeat(3,1fr);} .grid-4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:760px){.grid-5,.grid-4,.grid-3,.grid-2{grid-template-columns:repeat(2,1fr);}}

.stat{
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:var(--radius);
  padding:16px 17px;
  position:relative;
  overflow:hidden;
  transition:border-color .15s, transform .15s;
}
.stat::before{
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity:0;
  transition:opacity .2s;
}
.stat:hover{border-color:var(--border); transform:translateY(-1px);}
.stat:hover::before{opacity:1;}
.stat-label{font-family:var(--font-mono); font-size:10px; letter-spacing:1.2px; color:var(--text-faint); text-transform:uppercase; margin-bottom:9px;}
.stat-value{font-family:var(--font-mono); font-size:22px; font-weight:600; letter-spacing:-0.3px;}
.stat-value.profit{color:var(--profit);}
.stat-value.loss{color:var(--loss);}
.stat-value.gold{color:var(--gold-light);}
.stat-sub{font-size:11px; color:var(--text-faint); margin-top:6px;}

.section-label{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--text-faint); margin:30px 2px 12px;
}
.panel{
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:var(--radius);
  padding:20px 22px;
  margin-bottom:16px;
}
.panel-title{font-family:var(--font-display); font-size:19px; font-weight:600; margin-bottom:2px;}
.panel-sub{font-size:12px; color:var(--text-muted); margin-bottom:14px; font-family:var(--font-mono);}

/* ---------- TABLES ---------- */
.tbl-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:12.5px;}
thead th{
  text-align:left; font-family:var(--font-mono); font-size:10px; letter-spacing:1px;
  color:var(--text-faint); text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody td{padding:9px 10px; border-bottom:1px solid var(--border-soft); white-space:nowrap; font-family:var(--font-mono); color:var(--text);}
tbody tr:hover{background:var(--surface-2);}
tbody tr:last-child td{border-bottom:none;}
.tag{
  display:inline-flex; align-items:center; padding:2px 8px; border-radius:5px;
  font-size:10.5px; font-weight:600; letter-spacing:0.4px;
}
.tag-buy{background:rgba(47,217,166,0.13); color:var(--profit);}
.tag-sell{background:rgba(255,93,115,0.13); color:var(--loss);}
.tag-win{background:rgba(47,217,166,0.13); color:var(--profit);}
.tag-loss{background:rgba(255,93,115,0.13); color:var(--loss);}
.tag-be{background:rgba(154,163,178,0.15); color:var(--be);}
.tag-q{font-family:var(--font-mono); font-weight:700;}
.q-Aplus{color:var(--gold-light);}
.q-A{color:var(--profit);}
.q-B{color:#E8B84B;}
.q-C{color:var(--text-faint);}
.txt-profit{color:var(--profit);}
.txt-loss{color:var(--loss);}
.del-btn{background:none; border:none; color:var(--text-faint); padding:4px; border-radius:5px;}
.del-btn:hover{color:var(--loss); background:var(--loss-dim);}

/* ---------- FORM ---------- */
.form-row{display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; margin-bottom:6px;}
.field{display:flex; flex-direction:column; gap:5px; min-width:90px;}
.field label{font-family:var(--font-mono); font-size:9.5px; letter-spacing:1px; color:var(--text-faint); text-transform:uppercase;}
.field input, .field select{
  background:var(--surface-2); border:1px solid var(--border); color:var(--text);
  border-radius:7px; padding:8px 9px; font-size:12.5px; outline:none; font-family:var(--font-mono);
}
.field input:focus, .field select:focus{border-color:var(--gold-dim);}
.field.grow{flex:1; min-width:140px;}

.day-group{margin-bottom:16px; border:1px solid var(--border-soft); border-radius:var(--radius); overflow:hidden;}
.day-head{
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 18px; background:var(--surface-2); border-bottom:1px solid var(--border-soft);
}
.day-date{font-family:var(--font-display); font-weight:600; font-size:15px;}
.day-meta{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-left:10px;}
.day-pnl{font-family:var(--font-mono); font-weight:600; font-size:14.5px;}

/* ---------- CALENDAR ---------- */
.cal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.cal-nav{display:flex; align-items:center; gap:12px;}
.cal-nav button{background:var(--surface); border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:7px; display:flex; align-items:center; justify-content:center;}
.cal-nav button:hover{border-color:var(--gold-dim);}
.cal-month{font-family:var(--font-mono); font-weight:600; min-width:140px; text-align:center; font-size:14px;}
.legend{display:flex; gap:16px; font-size:11px; color:var(--text-muted); margin-bottom:16px;}
.legend span{display:inline-flex; align-items:center; gap:6px;}
.legend i{width:11px; height:11px; border-radius:3px; display:inline-block;}
.cal-grid{display:grid; grid-template-columns:repeat(7, 1fr); gap:7px;}
.cal-dow{font-family:var(--font-mono); font-size:10px; letter-spacing:1px; color:var(--text-faint); text-align:center; padding-bottom:4px;}
.cal-cell{
  min-height:78px; border-radius:8px; border:1px solid var(--border-soft); padding:8px 9px;
  background:var(--surface); display:flex; flex-direction:column; justify-content:space-between;
}
.cal-cell.empty{background:transparent; border-color:transparent;}
.cal-cell.profit{background:var(--profit-dim); border-color:rgba(47,217,166,0.25);}
.cal-cell.loss{background:var(--loss-dim); border-color:rgba(255,93,115,0.25);}
.cal-daynum{font-family:var(--font-mono); font-size:12px; color:var(--text-muted); display:flex; justify-content:space-between;}
.cal-count{font-size:9.5px; color:var(--text-faint);}
.cal-pnl{font-family:var(--font-mono); font-weight:600; font-size:11.5px; align-self:flex-end;}

/* ---------- CHARTS ---------- */
.chart-box{width:100%; overflow-x:auto;}
.chart-box svg{display:block;}
.tooltip-hint{font-size:10.5px; color:var(--text-faint); margin-top:8px; font-family:var(--font-mono);}

/* ---------- NOTES ---------- */
.rule-list{display:flex; flex-direction:column; gap:9px;}
.rule-item{display:flex; gap:12px; align-items:flex-start; padding:9px 10px; border-radius:7px; transition:background .15s;}
.rule-item:hover{background:var(--surface-2);}
.rule-num{
  flex-shrink:0; width:26px; height:26px; border-radius:6px; background:var(--surface-2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:var(--gold-light); font-weight:700;
}
.rule-text{font-size:13px; padding-top:3px; line-height:1.4;}
.lot-row{display:flex; justify-content:space-between; align-items:center; padding:11px 12px; border-radius:8px; margin-bottom:8px;}
.lot-risk-very_low{background:rgba(47,217,166,0.08);}
.lot-risk-low{background:rgba(47,217,166,0.05);}
.lot-risk-medium{background:rgba(232,184,75,0.07);}
.lot-risk-high{background:rgba(255,93,115,0.08);}
.lot-left b{font-family:var(--font-mono); font-size:15px;}
.lot-mid{font-size:12.5px; color:var(--text-muted); flex:1; padding:0 14px;}
.lot-units{font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint);}
.risk-badge{font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.5px; padding:3px 8px; border-radius:5px; font-weight:700;}
.rb-very_low{color:var(--profit); background:rgba(47,217,166,0.13);}
.rb-low{color:var(--profit); background:rgba(47,217,166,0.1);}
.rb-medium{color:#E8B84B; background:rgba(232,184,75,0.13);}
.rb-high{color:var(--loss); background:rgba(255,93,115,0.13);}

.empty-state{
  text-align:center; padding:50px 20px; color:var(--text-faint);
}
.empty-state svg{width:40px; height:40px; opacity:.4; margin-bottom:12px;}

.toast{
  position:fixed; bottom:24px; right:24px; background:var(--surface-2); border:1px solid var(--gold-dim);
  color:var(--text); padding:11px 18px; border-radius:8px; font-size:12.5px; font-family:var(--font-mono);
  box-shadow:0 8px 24px -8px rgba(0,0,0,0.5); opacity:0; transform:translateY(8px); transition:all .25s; z-index:999;
}
.toast.show{opacity:1; transform:translateY(0);}

@media(max-width:880px){
  .sidebar{display:none;}
  .page{padding:22px 16px;}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">Au</div>
      <div>
        <div class="brand-name">Aurum Journal</div>
        <div class="brand-sub">XAUUSD · V2.0</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">TRADE JOURNAL · <span id="footer-year"></span><br><a onclick="handleLogout()" style="color:var(--loss); cursor:pointer;">Logout</a></div>
  </aside>
  <div class="main">
    <div class="topbar"></div>
    <div class="page" id="page"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<div id="auth-overlay" style="position:fixed; inset:0; background:#0D1016; z-index:999; display:flex; align-items:center; justify-content:center;">
  <div style="width:320px; background:#151A22; border:1px solid #262D39; border-radius:10px; padding:28px;">
    <div style="font-family:'Fraunces',serif; font-size:22px; font-weight:600; color:#ECE7DA; margin-bottom:4px;">Aurum Journal</div>
    <div style="font-size:12px; color:#8993A4; margin-bottom:18px;">Login to access your trades</div>
    <input id="auth-email" type="email" placeholder="Email" style="width:100%; padding:9px 10px; margin-bottom:8px; background:#1B212B; border:1px solid #262D39; border-radius:8px; color:#ECE7DA;">
    <input id="auth-password" type="password" placeholder="Password" style="width:100%; padding:9px 10px; margin-bottom:12px; background:#1B212B; border:1px solid #262D39; border-radius:8px; color:#ECE7DA;">
    <div id="auth-error" style="font-size:11.5px; color:#FF5D73; margin-bottom:10px; display:none;"></div>
    <button onclick="handleLogin()" style="width:100%; padding:10px; margin-bottom:8px; background:linear-gradient(135deg,#F2D680,#D4AF37); color:#241F0A; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Login</button>
    <button onclick="handleSignup()" style="width:100%; padding:10px; background:#1B212B; color:#ECE7DA; border:1px solid #262D39; border-radius:8px; cursor:pointer;">Create Account</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------- Supabase setup ---------- */
const SUPABASE_URL = 'PASTE_YOUR_PROJECT_URL_HERE';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;

function showAuthError(msg){
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}
async function handleSignup(){
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if(!email || !password){ showAuthError('Enter email and password'); return; }
  const { error } = await sb.auth.signUp({ email, password });
  if(error){ showAuthError(error.message); return; }
  showAuthError('Account created! Now click Login.');
}
async function handleLogin(){
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if(!email || !password){ showAuthError('Enter email and password'); return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ showAuthError(error.message); return; }
  await startApp();
}
async function handleLogout(){
  await sb.auth.signOut();
  currentUser = null;
  state.trades = [];
  document.getElementById('auth-overlay').style.display = 'flex';
}
async function startApp(){
  const { data } = await sb.auth.getUser();
  if(!data || !data.user){ return; }
  currentUser = data.user;
  document.getElementById('auth-overlay').style.display = 'none';
  await loadState();
  renderNav();
  renderPage();
}
</script>

<script>
/* ============================================================
   AURUM JOURNAL — gold trading journal
   ============================================================ */

const PAGES = [
  {id:'dashboard', label:'Dashboard', icon:'grid'},
  {id:'trades', label:'Trades', icon:'book'},
  {id:'calendar', label:'Calendar', icon:'calendar'},
  {id:'summaries', label:'Summaries', icon:'pie'},
  {id:'charts', label:'Charts', icon:'chart'},
  {id:'notes', label:'Notes & Rules', icon:'doc'},
  {id:'archive', label:'Weekly Archive', icon:'archive'},
];

const ICONS = {
  grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4.5A1.5 1.5 0 0 1 5.5 3H12v18H5.5A1.5 1.5 0 0 1 4 19.5z"/><path d="M20 4.5A1.5 1.5 0 0 0 18.5 3H12v18h6.5a1.5 1.5 0 0 0 1.5-1.5z"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>',
  pie:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21.2 15a9 9 0 1 1-9.2-12.9V12z"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 17l5-5 4 4 8-9"/><path d="M3 21h18"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2.5h9l3 3V21a.5.5 0 0 1-.5.5H6a.5.5 0 0 1-.5-.5V3a.5.5 0 0 1 .5-.5z"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>',
  archive:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="5" rx="1"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></svg>',
};

/* ---------- math helpers ---------- */
const r1 = n => Math.round(n*10)/10;
const r2 = n => Math.round(n*100)/100;
const r3 = n => Math.round(n*1000)/1000;
function num(v){ return (v===null||v===undefined||v==='') ? null : parseFloat(v); }

function fmtMoney(n, withSign){
  if(n===null||n===undefined||isNaN(n)) return '—';
  const sign = n<0 ? '-' : (withSign ? '+' : '');
  return sign + '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtPct(n, d=2){ if(n===null||n===undefined||isNaN(n)) return '—'; return n.toFixed(d)+'%'; }
function fmtNum(n, d=2){ if(n===null||n===undefined||isNaN(n)) return '—'; return n.toFixed(d); }

function calcTrade(t){
  const dir = t.side === 'BUY' ? 1 : -1;
  const entry = num(t.entry), exit = num(t.exit), sl = num(t.sl), tp = num(t.tp), lot = num(t.lot) || 0;
  let pips=null, pnl=null, slPips=null, riskDollar=null, riskPercent=null, tpPips=null, rr=null, posSize=null, result=null;
  if(entry!=null && exit!=null){
    pips = r1(((exit-entry)*dir)/PIP);
    pnl = r2(pips*lot*100);
    result = pnl>0.001 ? 'WIN' : (pnl<-0.001 ? 'LOSS' : 'BE');
  }
  if(entry!=null && sl!=null){
    slPips = r1(Math.abs(entry-sl)/PIP);
    riskDollar = r2(slPips*lot*100);
    riskPercent = r2(riskDollar/state.startingBalance*100);
    posSize = slPips>0 ? r3((0.01*state.startingBalance)/(slPips*100)) : null;
  }
  if(entry!=null && tp!=null){ tpPips = r1(Math.abs(tp-entry)/PIP); }
  if(slPips && tpPips && slPips>0){ rr = r2(tpPips/slPips); }
  return Object.assign({}, t, {entry, exit, sl, tp, lot, pips, pnl, slPips, riskDollar, riskPercent, tpPips, rr, posSize, result});
}
function computedTrades(){ return state.trades.map(calcTrade).sort((a,b)=> (a.date<b.date?1:a.date>b.date?-1:(b.created_at>a.created_at?1:-1))); }
function computedTradesAsc(){ return state.trades.map(calcTrade).sort((a,b)=> (a.date>b.date?1:a.date<b.date?-1:(a.created_at>b.created_at?1:-1))); }

/* ---------- date helpers ---------- */
function pad(n){ return n<10?'0'+n:''+n; }
function toISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseISO(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function startOfWeek(d){ const dt = new Date(d); const dow = (dt.getDay()+6)%7; dt.setDate(dt.getDate()-dow); dt.setHours(0,0,0,0); return dt; }
function addDays(d,n){ const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt; }
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ---------- aggregate stats ---------- */
function getStats(trades){
  const closed = trades.filter(t=>t.pnl!=null);
  const wins = closed.filter(t=>t.result==='WIN');
  const losses = closed.filter(t=>t.result==='LOSS');
  const be = closed.filter(t=>t.result==='BE');
  const netPnl = r2(closed.reduce((s,t)=>s+t.pnl,0));
  const currentBalance = r2(state.startingBalance + netPnl);
  const grossWin = wins.reduce((s,t)=>s+t.pnl,0);
  const grossLoss = Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const profitFactor = grossLoss>0 ? r2(grossWin/grossLoss) : (grossWin>0 ? Infinity : 0);
  const best = closed.length ? closed.reduce((a,b)=> a.pnl>b.pnl?a:b) : null;
  const worst = closed.length ? closed.reduce((a,b)=> a.pnl<b.pnl?a:b) : null;
  const avgWin = wins.length ? r2(grossWin/wins.length) : 0;
  const avgLoss = losses.length ? r2(-grossLoss/losses.length) : 0;
  const rrTrades = closed.filter(t=>t.rr!=null);
  const avgRR = rrTrades.length ? r2(rrTrades.reduce((s,t)=>s+t.rr,0)/rrTrades.length) : 0;
  const avgTradePnl = closed.length ? r2(netPnl/closed.length) : 0;
  const winRate = closed.length ? r2(wins.length/closed.length*100) : 0;

  // equity curve & drawdown (chronological)
  const asc = computedTradesAsc().filter(t=>t.pnl!=null);
  let bal = state.startingBalance, peak = state.startingBalance, maxDD = 0, maxDDPct = 0;
  const curve = [{date:'start', balance: state.startingBalance}];
  asc.forEach(t=>{
    bal = r2(bal + t.pnl);
    curve.push({date:t.date, balance: bal});
    if(bal>peak) peak = bal;
    const dd = peak - bal;
    const ddPct = peak>0 ? dd/peak*100 : 0;
    if(dd>maxDD) maxDD = dd;
    if(ddPct>maxDDPct) maxDDPct = ddPct;
  });
  // streaks
  let curW=0,curL=0,maxW=0,maxL=0;
  asc.forEach(t=>{
    if(t.result==='WIN'){ curW++; curL=0; if(curW>maxW) maxW=curW; }
    else if(t.result==='LOSS'){ curL++; curW=0; if(curL>maxL) maxL=curL; }
    else { curW=0; curL=0; }
  });

  return {
    closedCount: closed.length, wins: wins.length, losses: losses.length, be: be.length,
    netPnl, currentBalance, profitFactor, best, worst, avgWin, avgLoss, avgRR, avgTradePnl, winRate,
    returnPct: r2(netPnl/state.startingBalance*100),
    expectancy: avgTradePnl, maxDD: r2(maxDD), maxDDPct: r2(maxDDPct), maxWinStreak: maxW, maxLossStreak: maxL,
    curve
  };
}

function weekRangeFor(date){
  const s = startOfWeek(date);
  const e = addDays(s,6);
  return {start:s, end:e};
}

function getWeekTrades(trades, weekStart){
  const s = weekStart, e = addDays(weekStart,6);
  return trades.filter(t=>{ const d = parseISO(t.date); return d>=s && d<=e; });
}

function getMonthTrades(trades, year, month){
  return trades.filter(t=>{ const d = parseISO(t.date); return d.getFullYear()===year && d.getMonth()===month; });
}

async function seedDemoData(){
  const year = calView.year, month = new Date().getMonth();
  const notesPool = ['Clean breakout, held to TP','Engulfing candle on London open','NY session reversal','Fib retracement entry','Asian range fade','Patience paid off','Cut early — fear','News spike, avoided','Textbook pullback entry','Overtraded, lesson logged'];
  const count = 16 + Math.floor(Math.random()*10);
  const batch = [];
  for(let i=0;i<count;i++){
    const day = 1 + Math.floor(Math.random()*27);
    const date = new Date(year, month, day);
    const dow = date.getDay();
    if(dow===0||dow===6) continue;
    const side = Math.random()>0.5?'BUY':'SELL';
    const lotOptions = [0.05,0.1,0.1,0.2,0.5];
    const lot = lotOptions[Math.floor(Math.random()*lotOptions.length)];
    const entry = r2(2300 + Math.random()*150);
    const slPips = 15 + Math.random()*40;
    const rr = 1.2 + Math.random()*2.2;
    const tpPips = slPips*rr;
    const dir = side==='BUY'?1:-1;
    const sl = r2(entry - dir*slPips*PIP);
    const tp = r2(entry + dir*tpPips*PIP);
    const won = Math.random() < 0.6;
    let exit;
    if(won){ const frac = 0.4+Math.random()*0.8; exit = r2(entry + dir*tpPips*PIP*frac); }
    else { const frac = 0.5+Math.random()*0.7; exit = r2(entry - dir*slPips*PIP*frac); }
    batch.push({
      user_id: currentUser.id, date: toISO(date), side, lot, entry, exit, sl, tp,
      session: SESSIONS[Math.floor(Math.random()*3)],
      quality: QUALITIES[Math.floor(Math.random()*4)],
      notes: notesPool[Math.floor(Math.random()*notesPool.length)]
    });
  }
  const { data, error } = await sb.from('trades').insert(batch).select();
  if(error){ showToast('Seed failed: '+error.message); return; }
  state.trades.push(...data);
  showToast('Demo trades seeded for ' + MONTH_NAMES[month] + ' ' + year);
  renderPage();
}

}

/* ============================================================
   SVG CHART HELPERS
   ============================================================ */
function lineChart(values, W, H, colorVar){
  if(!values || values.length<2) return emptyChart(W,H,'Not enough data yet');
  const pad = {l:64, r:20, t:16, b:28};
  const min = Math.min(...values, 0), max = Math.max(...values, 0);
  const range = (max-min)||1;
  const cw = W-pad.l-pad.r, ch = H-pad.t-pad.b;
  const pts = values.map((v,i)=>{
    const x = pad.l + (i/(values.length-1))*cw;
    const y = pad.t + ch - ((v-min)/range)*ch;
    return [x,y];
  });
  const path = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const zeroY = pad.t + ch - ((0-min)/range)*ch;
  const area = path + ` L${pts[pts.length-1][0].toFixed(1)},${zeroY.toFixed(1)} L${pts[0][0].toFixed(1)},${zeroY.toFixed(1)} Z`;
  const gridLines = 4;
  let grid = '';
  for(let i=0;i<=gridLines;i++){
    const y = pad.t + (i/gridLines)*ch;
    const val = max - (i/gridLines)*range;
    grid += `<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${W-pad.r}" y2="${y.toFixed(1)}" stroke="var(--border-soft)" stroke-dasharray="3,4"/>`;
    grid += `<text x="${pad.l-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-family="IBM Plex Mono" font-size="10" fill="var(--text-faint)">${Math.round(val).toLocaleString()}</text>`;
  }
  const gid = 'g'+Math.random().toString(36).slice(2,8);
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(${colorVar})" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="var(${colorVar})" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${path}" fill="none" stroke="var(${colorVar})" stroke-width="2"/>
    <line x1="${pad.l}" y1="${zeroY.toFixed(1)}" x2="${W-pad.r}" y2="${zeroY.toFixed(1)}" stroke="var(--text-faint)" stroke-dasharray="2,3" opacity="0.5"/>
  </svg>`;
}
function barChart(labels, values, W, H){
  if(!values.length) return emptyChart(W,H,'No data yet');
  const pad = {l:64, r:20, t:16, b:30};
  const min = Math.min(...values,0), max = Math.max(...values,0);
  const range = (max-min)||1;
  const cw = W-pad.l-pad.r, ch = H-pad.t-pad.b;
  const bw = cw/values.length*0.55;
  const zeroY = pad.t + ch - ((0-min)/range)*ch;
  let bars='', grid='', labelsSvg='';
  const gridLines=4;
  for(let i=0;i<=gridLines;i++){
    const y = pad.t + (i/gridLines)*ch;
    const val = max - (i/gridLines)*range;
    grid += `<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${W-pad.r}" y2="${y.toFixed(1)}" stroke="var(--border-soft)" stroke-dasharray="3,4"/>`;
    grid += `<text x="${pad.l-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-family="IBM Plex Mono" font-size="10" fill="var(--text-faint)">${Math.round(val).toLocaleString()}</text>`;
  }
  values.forEach((v,i)=>{
    const cx = pad.l + (i+0.5)/values.length*cw;
    const y = pad.t + ch - ((v-min)/range)*ch;
    const top = Math.min(y, zeroY), h = Math.abs(zeroY-y);
    const color = v>=0 ? 'var(--profit)' : 'var(--loss)';
    bars += `<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" fill="${color}" rx="2" opacity="0.85"/>`;
    labelsSvg += `<text x="${cx.toFixed(1)}" y="${H-8}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9.5" fill="var(--text-faint)">${labels[i]}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    ${grid}
    <line x1="${pad.l}" y1="${zeroY.toFixed(1)}" x2="${W-pad.r}" y2="${zeroY.toFixed(1)}" stroke="var(--text-faint)" opacity="0.4"/>
    ${bars}${labelsSvg}
  </svg>`;
}
function emptyChart(W,H,msg){
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <text x="${W/2}" y="${H/2}" text-anchor="middle" font-family="Inter" font-size="13" fill="var(--text-faint)">${msg}</text>
  </svg>`;
}

                <td>${(t.id+'').slice(0,6)}</td>
                <td><span class="tag ${t.side==='BUY'?'tag-buy':'tag-sell'}">${t.side}</span></td>

                <td>${t.exit!=null?t.exit.toFixed(2):'—'}</td>
                <td>${t.sl!=null?t.sl.toFixed(2):'—'}</td>
                <td>${t.tp!=null?t.tp.toFixed(2):'—'}</td>
                <td class="${t.pips>0?'txt-profit':t.pips<0?'txt-loss':''}">${t.pips!=null?t.pips.toFixed(1):'—'}</td>
                <td class="${t.pnl>0?'txt-profit':t.pnl<0?'txt-loss':''}">${t.pnl!=null?fmtMoney(t.pnl,true):'—'}</td>
                <td>${t.result?`<span class="tag tag-${t.result.toLowerCase()}">${t.result}</span>`:'—'}</td>

          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="page-head">
    <div>
      <div class="eyebrow">Trades Sheet</div>
      <div class="page-title">Gold (XAUUSD) Journal</div>

}
async function addTradeFromForm(e){
  e.preventDefault();
  const t = {
    date: document.getElementById('f-date').value,
    side: document.getElementById('f-side').value,
    lot: parseFloat(document.getElementById('f-lot').value)||0,
    entry: document.getElementById('f-entry').value,
    exit: document.getElementById('f-exit').value,
    sl: document.getElementById('f-sl').value,
    tp: document.getElementById('f-tp').value,
    session: document.getElementById('f-session').value,
    quality: document.getElementById('f-quality').value,
    notes: document.getElementById('f-notes').value,
  };
  const saved = await insertTradeRemote(t);
  if(!saved) return;
  state.trades.push({ id: saved.id, created_at: saved.created_at, ...t });
  showToast('Trade added');
  renderPage();
}
async function deleteTrade(id){
  await deleteTradeRemote(id);
  state.trades = state.trades.filter(t=>t.id!==id);
  showToast('Trade removed');
  renderPage();
}

/* ============================================================
   CALENDAR PAGE
   ============================================================ */
function pageCalendar(){
  const trades = computedTrades();
  const {year, month} = calView;
  const first = new Date(year, month, 1);
  const startDow = (first.getDay()+6)%7; // Mon=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);

  // build day stats
  const dayStats = {};
  trades.forEach(t=>{
    if(parseISO(t.date).getFullYear()===year && parseISO(t.date).getMonth()===month){
      const d = parseISO(t.date).getDate();
      if(!dayStats[d]) dayStats[d] = {count:0, pnl:0};
      dayStats[d].count++;
      if(t.pnl!=null) dayStats[d].pnl += t.pnl;
    }
  });

  let grid = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  cells.forEach(d=>{
    if(d===null){ grid += `<div class="cal-cell empty"></div>`; return; }
    const stat = dayStats[d];
    let cls='', pnlHtml='';
    if(stat){
      cls = stat.pnl>0 ? 'profit' : (stat.pnl<0 ? 'loss' : '');
      pnlHtml = `<div class="cal-pnl ${stat.pnl>=0?'txt-profit':'txt-loss'}">${fmtMoney(r2(stat.pnl), true)}</div>`;
    }
    grid += `<div class="cal-cell ${cls}">
      <div class="cal-daynum"><span>${d}</span>${stat?`<span class="cal-count">${stat.count}t</span>`:''}</div>
      ${pnlHtml}
    </div>`;
  });

  return `
  <div class="page-head">
    <div>
      <div class="eyebrow">Calendar Sheet</div>
      <div class="page-title">${MONTH_NAMES[month]} ${year}</div>
    </div>
    <div class="cal-nav">
      <button onclick="calMove(-1)">←</button>
      <div class="cal-month">${MONTH_NAMES[month]} ${year}</div>
      <button onclick="calMove(1)">→</button>
    </div>
  </div>
  <div class="legend">
    <span><i style="background:var(--profit-dim); border:1px solid rgba(47,217,166,.3);"></i>Profit Day</span>
    <span><i style="background:var(--loss-dim); border:1px solid rgba(255,93,115,.3);"></i>Loss Day</span>
    <span><i style="background:var(--surface); border:1px solid var(--border-soft);"></i>No Trade</span>
  </div>
  <div class="cal-grid">${grid}</div>
  `;
}
function calMove(dir){
  calView.month += dir;
  if(calView.month<0){ calView.month=11; calView.year--; }
  if(calView.month>11){ calView.month=0; calView.year++; }
  renderPage();
}

/* ============================================================
   SUMMARIES PAGE
   ============================================================ */
function pageSummaries(){
  const trades = computedTrades();
  const year = calView.year;
  let runningBalance = state.startingBalance;
  const monthRows = MONTH_NAMES.map((name, idx)=>{
    const mTrades = getMonthTrades(trades, year, idx).filter(t=>t.pnl!=null);
    const wins = mTrades.filter(t=>t.result==='WIN').length;
    const losses = mTrades.filter(t=>t.result==='LOSS').length;
    const be = mTrades.filter(t=>t.result==='BE').length;
    const wr = mTrades.length ? r2(wins/mTrades.length*100) : 0;
    const pnl = r2(mTrades.reduce((a,t)=>a+t.pnl,0));
    runningBalance = r2(runningBalance + pnl);
    return {name, trades:mTrades.length, wins, losses, be, wr, pnl, runningBalance};
  });
  const totalTrades = monthRows.reduce((a,m)=>a+m.trades,0);
  const totalWins = monthRows.reduce((a,m)=>a+m.wins,0);
  const totalLosses = monthRows.reduce((a,m)=>a+m.losses,0);
  const totalBE = monthRows.reduce((a,m)=>a+m.be,0);
  const totalPnl = r2(monthRows.reduce((a,m)=>a+m.pnl,0));
  const totalWR = totalTrades ? r2(totalWins/totalTrades*100) : 0;

  // weekly summary — only weeks that have trades
  const weeks = getWeekRanges(year);
  let wBalance = state.startingBalance;
  const weekRowsAll = weeks.map(w=>{
    const wt = trades.filter(t=>{ const d=parseISO(t.date); return d>=w.start && d<=w.end; }).filter(t=>t.pnl!=null);
    const wins = wt.filter(t=>t.result==='WIN').length;
    const wr = wt.length ? r2(wins/wt.length*100) : 0;
    const pnl = r2(wt.reduce((a,t)=>a+t.pnl,0));
    wBalance = r2(wBalance+pnl);
    return {start:w.start, end:w.end, count:wt.length, wins, losses:wt.length-wins-wt.filter(t=>t.result==='BE').length, wr, pnl, bal:wBalance};
  });
  const weekRows = weekRowsAll.filter(w=>w.count>0).reverse();

  return `
  <div class="page-head">
    <div>
      <div class="eyebrow">Performance Summaries</div>
      <div class="page-title">Summaries</div>
    </div>
    <div class="cal-nav">
      <button onclick="calView.year--; renderPage();">←</button>
      <div class="cal-month">${year}</div>
      <button onclick="calView.year++; renderPage();">→</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Monthly Summary — ${year}</div>
    <div class="tbl-wrap" style="margin-top:10px;">
      <table>
        <thead><tr><th>Month</th><th>Trades</th><th>Wins</th><th>Losses</th><th>BE</th><th>Win Rate</th><th>Net P&amp;L</th><th>Running Balance</th></tr></thead>
        <tbody>
          ${monthRows.map(m=>`<tr>
            <td style="font-family:Inter; font-weight:500;">${m.name}</td>
            <td>${m.trades}</td><td class="txt-profit">${m.wins}</td><td class="txt-loss">${m.losses}</td><td>${m.be}</td>
            <td>${fmtPct(m.wr)}</td>
            <td class="${m.pnl>=0?'txt-profit':'txt-loss'}">${fmtMoney(m.pnl)}</td>
            <td>${fmtMoney(m.runningBalance)}</td>
          </tr>`).join('')}
          <tr style="font-weight:700;">
            <td style="font-family:Inter;">Yearly Total</td><td>${totalTrades}</td>
            <td class="txt-profit">${totalWins}</td><td class="txt-loss">${totalLosses}</td><td>${totalBE}</td>
            <td>${fmtPct(totalWR)}</td>
            <td class="${totalPnl>=0?'txt-profit':'txt-loss'}">${fmtMoney(totalPnl)}</td>
            <td>${fmtMoney(runningBalance)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Weekly Summary</div>
    <div class="panel-sub">Showing weeks with logged activity</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Start</th><th>End</th><th>Trades</th><th>Wins</th><th>Losses</th><th>Win Rate</th><th>Net P&amp;L</th><th>Balance</th></tr></thead>
        <tbody>
          ${weekRows.length ? weekRows.map(w=>`<tr>
            <td>${toISO(w.start)}</td><td>${toISO(w.end)}</td><td>${w.count}</td>
            <td class="txt-profit">${w.wins}</td><td class="txt-loss">${w.losses}</td>
            <td>${fmtPct(w.wr)}</td>
            <td class="${w.pnl>=0?'txt-profit':'txt-loss'}">${fmtMoney(w.pnl)}</td>
            <td>${fmtMoney(w.bal)}</td>
          </tr>`).join('') : `<tr><td colspan="8" style="text-align:center; color:var(--text-faint); font-family:Inter;">No trades logged this year yet</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>
  `;
}
function getWeekRanges(year){
  const weeks = [];
  let cursor = startOfWeek(new Date(year,0,1));
  const yearEnd = new Date(year,11,31);
  while(cursor <= yearEnd){
    weeks.push({start:new Date(cursor), end:addDays(cursor,6)});
    cursor = addDays(cursor,7);
  }
  return weeks;
}

/* ============================================================
   CHARTS PAGE
   ============================================================ */
function pageCharts(){
  const trades = computedTrades();
  const s = getStats(trades);
  const year = calView.year;
  const monthly = MONTH_NAMES.map((name,idx)=>{
    const mt = getMonthTrades(trades, year, idx).filter(t=>t.pnl!=null);
    return r2(mt.reduce((a,t)=>a+t.pnl,0));
  });
  const monthLabels = MONTH_NAMES.map(m=>m.slice(0,3));

  // drawdown series
  const asc = computedTradesAsc().filter(t=>t.pnl!=null);
  let bal = state.startingBalance, peak = state.startingBalance;
  const dd = [0];
  asc.forEach(t=>{ bal = r2(bal+t.pnl); if(bal>peak) peak=bal; dd.push(r2(peak-bal)); });

  return `
  <div class="page-head">
    <div>
      <div class="eyebrow">Visual Analytics</div>
      <div class="page-title">Charts</div>
      <div class="page-desc">Equity, monthly performance and drawdown — at a glance.</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-sub">EQUITY CURVE</div>
    <div class="panel-title">Account Growth</div>
    <div class="chart-box">${lineChart(s.curve.map(p=>p.balance), 980, 260, '--gold')}</div>
  </div>

  <div class="panel">
    <div class="panel-title">Monthly Net P&amp;L — ${year}</div>
    <div class="chart-box">${barChart(monthLabels, monthly, 980, 260)}</div>
  </div>

  <div class="panel">
    <div class="panel-title">Drawdown Curve</div>
    <div class="chart-box">${lineChart(dd, 980, 220, '--loss')}</div>
    <div class="tooltip-hint">Distance from equity peak, in account currency.</div>
  </div>
  `;
}

/* ============================================================
   WEEKLY ARCHIVE PAGE
   ============================================================ */
function pageArchive(){
  const trades = computedTrades();
  const year = calView.year;
  const weeks = getWeekRanges(year);
  let bal = state.startingBalance;
  const rows = weeks.map((w,i)=>{
    const wt = trades.filter(t=>{ const d=parseISO(t.date); return d>=w.start && d<=w.end; }).filter(t=>t.pnl!=null);
    const wins = wt.filter(t=>t.result==='WIN').length;
    const losses = wt.filter(t=>t.result==='LOSS').length;
    const be = wt.filter(t=>t.result==='BE').length;
    const wr = wt.length ? r2(wins/wt.length*100) : 0;
    const pnl = r2(wt.reduce((a,t)=>a+t.pnl,0));
    bal = r2(bal+pnl);
    return {n:i+1, start:w.start, end:w.end, count:wt.length, wins, losses, be, wr, pnl, bal};
  });
  return `
  <div class="page-head">
    <div>
      <div class="eyebrow">Weekly Archive</div>
      <div class="page-title">${rows.length} Weeks · ${year}</div>
      <div class="page-desc">Historical performance data — never deleted, always auto-calculated.</div>
    </div>
    <div class="cal-nav">
      <button onclick="calView.year--; renderPage();">←</button>
      <div class="cal-month">${year}</div>
      <button onclick="calView.year++; renderPage();">→</button>
    </div>
  </div>
  <div class="panel">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Week</th><th>Start</th><th>End</th><th>Trades</th><th>Wins</th><th>Losses</th><th>BE</th><th>Win Rate</th><th>Net P&amp;L</th><th>Running Balance</th></tr></thead>
        <tbody>
          ${rows.map(w=>`<tr>
            <td>W${w.n}</td><td>${toISO(w.start)}</td><td>${toISO(w.end)}</td><td>${w.count}</td>
            <td class="txt-profit">${w.wins}</td><td class="txt-loss">${w.losses}</td><td>${w.be}</td>
            <td>${fmtPct(w.wr)}</td>
            <td class="${w.pnl>=0?'txt-profit':'txt-loss'}">${fmtMoney(w.pnl)}</td>
            <td>${fmtMoney(w.bal)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;
}
